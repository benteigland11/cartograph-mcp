name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest pytest-asyncio

      - name: Run test suite
        run: pytest -q

      - name: Build package
        run: |
          python -m pip install build
          python -m build

  auto-tag:
    name: Auto-tag on version bump
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from pyproject.toml
        id: version
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import pathlib
          import re

          pyproject = pathlib.Path("pyproject.toml").read_text()
          match = re.search(r'^version = "([^"]+)"$', pyproject, re.MULTILINE)
          if not match:
              raise SystemExit("Could not find project version in pyproject.toml")
          print(f"version={match.group(1)}")
          PY

      - name: Check if tag already exists
        id: tagcheck
        env:
          TAG: v${{ steps.version.outputs.version }}
        run: |
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists - nothing to do."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG does not exist - will create."
          fi

      - name: Check whether version changed in this push
        id: versionchange
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import pathlib
          import re
          import subprocess

          current = pathlib.Path("pyproject.toml").read_text()
          current_match = re.search(r'^version = "([^"]+)"$', current, re.MULTILINE)
          if not current_match:
              raise SystemExit("Could not find current version in pyproject.toml")
          current_version = current_match.group(1)

          changed = True
          try:
              previous = subprocess.check_output(
                  ["git", "show", "HEAD^:pyproject.toml"],
                  text=True,
              )
              previous_match = re.search(r'^version = "([^"]+)"$', previous, re.MULTILINE)
              if previous_match:
                  changed = previous_match.group(1) != current_version
          except subprocess.CalledProcessError:
              changed = True

          print(f"changed={'true' if changed else 'false'}")
          PY

      - name: Create and push tag
        if: steps.tagcheck.outputs.exists == 'false' && steps.versionchange.outputs.changed == 'true'
        env:
          TAG: v${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
