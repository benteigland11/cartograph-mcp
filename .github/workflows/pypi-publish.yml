name: pypi-publish

on:
  workflow_run:
    workflows:
      - ci
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    environment:
      name: pypi

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Determine release version
        id: version
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re
          import subprocess
          
          pyproject = pathlib.Path("pyproject.toml").read_text()
          match = re.search(r'^version = "([^"]+)"$', pyproject, re.MULTILINE)
          if not match:
              raise SystemExit("Could not find project version in pyproject.toml")
          version = match.group(1)
          tag = f"v{version}"
          
          prev_version = None
          try:
              prev_pyproject = subprocess.check_output(
                  ["git", "show", "HEAD^:pyproject.toml"],
                  text=True,
              )
              prev_match = re.search(r'^version = "([^"]+)"$', prev_pyproject, re.MULTILINE)
              if prev_match:
                  prev_version = prev_match.group(1)
          except subprocess.CalledProcessError:
              prev_version = None
          
          tag_exists = subprocess.run(
              ["git", "rev-parse", "-q", "--verify", f"refs/tags/{tag}"],
              capture_output=True,
              text=True,
          ).returncode == 0
          
          should_release = not tag_exists and (
              "${{ github.event_name }}" == "workflow_dispatch" or prev_version != version
          )
          
          out = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          with out.open("a") as fh:
              fh.write(f"version={version}\n")
              fh.write(f"tag={tag}\n")
              fh.write(f"should_release={'true' if should_release else 'false'}\n")
          PY

      - name: Skip when version was not bumped
        if: steps.version.outputs.should_release != 'true'
        run: |
          echo "No new version bump detected; skipping publish."

      - name: Build distributions
        if: steps.version.outputs.should_release == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Publish to PyPI
        if: steps.version.outputs.should_release == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub release
        if: steps.version.outputs.should_release == 'true' && github.event_name != 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --target "${{ github.event.workflow_run.head_sha }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes

      - name: Create GitHub release for manual dispatch
        if: steps.version.outputs.should_release == 'true' && github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes
