name: pypi-publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  tests:
    name: Tests
    if: github.event_name != 'workflow_dispatch'
    uses: ./.github/workflows/ci.yml

  publish:
    name: Build and publish
    if: always() && (github.event_name == 'workflow_dispatch' || needs.tests.result == 'success')
    needs: tests
    runs-on: ubuntu-latest
    environment:
      name: pypi
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Determine release tag
        id: release
        run: |
          python - <<'PY'
          import pathlib
          import re
          import os
          
          pyproject = pathlib.Path("pyproject.toml").read_text()
          match = re.search(r'^version = "([^"]+)"$', pyproject, re.MULTILINE)
          if not match:
              raise SystemExit("Could not find project version in pyproject.toml")
          version = match.group(1)
          tag = f"v{version}"

          out = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          with out.open("a") as fh:
              fh.write(f"version={version}\n")
              fh.write(f"tag={tag}\n")
          PY

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  fresh-install:
    name: Fresh install
    needs: publish
    uses: ./.github/workflows/fresh-install.yml
    with:
      version: ${{ needs.publish.outputs.version }}

  release:
    name: Create GitHub release
    needs: [publish, fresh-install]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.publish.outputs.tag }}
        run: |
          gh release create "${TAG}" \
            --title "${TAG}" \
            --generate-notes
